name: EAS build preflight
on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]
jobs:
  build-preflight:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npm run prebuild:check
